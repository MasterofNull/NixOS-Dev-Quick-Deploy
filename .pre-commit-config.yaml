repos:
  - repo: local
    hooks:
      - id: tier0-validation
        name: Tier 0 Validation Gate
        entry: scripts/governance/tier0-validation-gate.sh --pre-commit
        language: script
        pass_filenames: false
        stages: [commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
