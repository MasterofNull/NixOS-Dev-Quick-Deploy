drop_zones:
  - name: "Autonomous Research"
    watch: ["research_inbox/"]
    trigger: ["created"]
    skill: ".agent/skills/autoresearch/SKILL.md"
    team: ["Architect"]
    handoff_limit: 5

  - name: "Security Audit"
    watch: ["ai-stack/**/*.py"]
    trigger: ["modified"]
    skill: ".agent/skills/security-audit/SKILL.md"
    team: ["Auditor"]
    handoff_limit: 3

  - name: "System Recovery"
    watch: ["logs/alerts/*.json"]
    trigger: ["created", "modified"]
    skill: ".agent/skills/system-recovery/SKILL.md"
    team: ["Architect", "Coder", "Tester"]
    handoff_limit: 5

  - name: "PRSI Autonomous Review"
    watch: [".reports/prsi-pending.json"]
    trigger: ["created", "modified"]
    skill: ".agent/skills/prsi-review/SKILL.md"
    team: ["Auditor"]
    handoff_limit: 3

  - name: "Asynchronous Delegation"
    watch: ["tasks_inbox/*.md"]
    trigger: ["created"]
    skill: ".agent/skills/async-delegation/SKILL.md"
    team: ["Architect", "Coder", "Auditor"]
    handoff_limit: 8

  - name: "Test Failure Auto-Remediation"
    watch: [".reports/test-failures/*.json", ".reports/test-failures/*.log"]
    trigger: ["created", "modified"]
    skill: ".agent/skills/test-remediation/SKILL.md"
    team: ["Architect", "Coder", "Tester"]
    handoff_limit: 5

  - name: "Flake Supply-Chain Review"
    watch: ["flake.lock"]
    trigger: ["modified"]
    skill: ".agent/skills/flake-review/SKILL.md"
    team: ["Auditor", "Tester"]
    handoff_limit: 3
