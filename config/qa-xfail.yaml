  - id: "93.8"
    reason: >
      Human-agent control endpoint returns 401 (Unauthorized) on POST /agent-runs/{id}/control.
      Check expects 422 (validation failure for invalid action) but route requires auth token
      not provided by the test probe. Pre-existing auth gap in QA check.
      Fix: add auth bypass for internal health probes or mock the check to skip auth.
    created: "2026-07-01"
    expires: "2026-07-31"
    owner: hyperd
