_meta:
  version: "1.0"
  description: "Authoritative environment variable contract for the NixOS-Dev-Quick-Deploy AI stack"
  owner: claude-sonnet-4-6
  last_updated: "2026-05-20"
  enforcement: "scripts/governance/tier0-validation-gate.sh (gate_env_contract)"

# ---------------------------------------------------------------------------
# HOW TO READ THIS FILE
#
# Each variable entry has:
#   canonical:   The single authoritative name all new code must use
#   aliases:     Deprecated names that still work via shim (sunset 2026-08-20)
#   default:     Compile-time default value
#   layer:       Where it is authoritative: nix | systemd | shell | python | all
#   consumers:   Which services/modules read this variable
#   description: What it controls
#
# Enforcement:
#   New .py or .sh files that introduce env var names not listed here will
#   be rejected by the tier0 gate (gate_env_contract check).
#   Aliases continue to work at runtime but generate a deprecation warning
#   from the consuming service on startup (where implemented).
# ---------------------------------------------------------------------------

variables:

  # ── llama.cpp inference server ─────────────────────────────────────────
  - canonical: LLAMA_CPP_BASE_URL
    aliases: [LLAMA_URL, LLAMA_CPP_URL]
    default: "http://127.0.0.1:8080"
    layer: all
    consumers: [hybrid-coordinator, dashboard-backend, switchboard, aq-qa, edgeai, aq-report]
    description: "Base URL of the llama.cpp inference server (port 8080)"

  - canonical: LLAMA_PORT
    aliases: []
    default: "8080"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for llama.cpp inference server; used to construct LLAMA_CPP_BASE_URL"

  - canonical: LLAMA_HOST
    aliases: []
    default: "127.0.0.1"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Host for llama.cpp inference server"

  - canonical: LLAMA_CTX_SIZE
    aliases: []
    default: "8192"
    layer: nix
    consumers: [switchboard]
    description: "Advertised local llama.cpp context window used by switchboard profile budget validation"

  # ── llama.cpp embedding server ──────────────────────────────────────────
  - canonical: EMBED_BASE_URL
    aliases: [EMBEDDINGS_URL, LLAMA_EMBED_URL, EMBED_URL, EMBEDDING_URL]
    default: "http://127.0.0.1:8081"
    layer: all
    consumers: [hybrid-coordinator, aq-qa]
    description: "Base URL of the llama.cpp embedding server (port 8081)"

  - canonical: EMBEDDINGS_PORT
    aliases: []
    default: "8081"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for embedding server; used to construct EMBED_BASE_URL"

  - canonical: EMBEDDINGS_HOST
    aliases: []
    default: "127.0.0.1"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Host for embedding server"

  # ── local browser automation ───────────────────────────────────────────
  - canonical: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
    aliases: []
    default: "1"
    layer: shell
    consumers: [home-manager, aq-screenshot]
    description: "Prevent Playwright from downloading browsers at runtime; use declaratively installed system Chromium instead"

  - canonical: CHROMIUM_PATH
    aliases: []
    default: "${pkgs.chromium}/bin/chromium"
    layer: shell
    consumers: [home-manager, aq-screenshot]
    description: "Chromium executable path used by local Playwright automation and screenshot capture"

  # ── hybrid-coordinator ──────────────────────────────────────────────────
  - canonical: HYBRID_COORDINATOR_URL
    aliases: [HYBRID_URL, COORDINATOR_URL]
    default: "http://127.0.0.1:8003"
    layer: all
    consumers: [dashboard-backend, switchboard, aq-qa, edgeai, delegate-scripts]
    description: "Base URL of the hybrid-coordinator service (port 8003)"

  - canonical: HYBRID_PORT
    aliases: []
    default: "8003"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for hybrid-coordinator; used to construct HYBRID_COORDINATOR_URL"

  - canonical: HYBRID_HOST
    aliases: []
    default: "127.0.0.1"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Host for hybrid-coordinator"

  - canonical: HYBRID_COORDINATOR_API_KEY
    aliases: [HYBRID_API_KEY, AI_STACK_API_KEY]
    default: ""
    layer: all
    consumers: [dashboard-backend, aq-qa, edgeai, delegate-scripts, switchboard]
    description: "API key for hybrid-coordinator authentication (also readable from /run/secrets/hybrid_coordinator_api_key)"

  - canonical: HYBRID_API_KEY_FILE
    aliases: []
    default: "/run/secrets/hybrid_coordinator_api_key"
    layer: nix
    consumers: [hybrid-coordinator (self)]
    description: "Path to file containing the hybrid-coordinator API key"

  - canonical: AI_TREE_SEARCH_ENABLED
    aliases: []
    default: "true"
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Enable branch-and-aggregate tree retrieval in hybrid coordinator"

  - canonical: AI_TREE_SEARCH_MAX_DEPTH
    aliases: []
    default: "2"
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Maximum tree-search expansion depth"

  - canonical: AI_TREE_SEARCH_BRANCH_FACTOR
    aliases: []
    default: "3"
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Maximum tree-search branches evaluated per depth level"

  - canonical: AI_TREE_SEARCH_MAX_BRANCHES
    aliases: []
    default: "4"
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Maximum total tree-search branch queries evaluated per request"

  - canonical: AI_TREE_SEARCH_TIMEOUT_S
    aliases: []
    default: "12.0"
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Maximum tree-search wall-clock seconds before returning partial ranked evidence"

  # ── switchboard ─────────────────────────────────────────────────────────
  - canonical: SWITCHBOARD_URL
    aliases: [SWB_URL]
    default: "http://127.0.0.1:8085"
    layer: all
    consumers: [aq-qa, dashboard-backend, edgeai]
    description: "Base URL of the switchboard service (port 8085)"

  - canonical: SWITCHBOARD_PORT
    aliases: []
    default: "8085"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for switchboard"

  - canonical: SWB_PROFILE_CATALOG_YAML_FILE
    aliases: [SWB_PROFILE_CATALOG_JSON_FILE, SWB_PROFILE_CATALOG_JSON]
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Path to YAML/JSON file containing switchboard profile catalog; SWB_PROFILE_CATALOG_JSON is inline JSON fallback"

  # ── switchboard tunables (Phase B+) ──────────────────────────────────────
  - canonical: SWB_LOCAL_TOOL_CALL_LIMIT
    aliases: []
    default: "16"
    layer: nix
    consumers: [switchboard]
    description: "Safety-fuse maximum tool calls per local-model request before forcing a response"

  - canonical: SWB_ACTIVE_TOOL_SCHEMA_LIMIT
    aliases: []
    default: "7"
    layer: nix
    consumers: [switchboard]
    description: "Maximum local tool schemas leased into an automatic active working set; explicit tool requests can still override"

  - canonical: SWB_TOOL_WORKING_SET_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable intent-based local tool working-set selection so unused built-in tool schemas are not injected"

  - canonical: SWB_REMOTE_TOOL_WORKING_SET_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable pruning of explicit remote-tool-calling schemas when intent clearly needs no tools or matches known bundles"

  - canonical: SWB_CONTEXT_OUTPUT_GC_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable compaction of large local tool observations into artifact pointers"

  - canonical: SWB_CONTEXT_OUTPUT_GC_MIN_CHARS
    aliases: []
    default: "2400"
    layer: nix
    consumers: [switchboard]
    description: "Minimum raw tool observation size before switchboard writes an artifact and keeps a compact pointer"

  - canonical: SWB_CONTEXT_OUTPUT_GC_SUMMARY_CHARS
    aliases: []
    default: "900"
    layer: nix
    consumers: [switchboard]
    description: "Maximum preview characters retained in compacted tool observations"

  - canonical: SWB_CONTEXT_ARTIFACT_DIR
    aliases: []
    default: "/home/$USER/.local/share/nixos-ai-stack/local-agents/switchboard-artifacts"
    layer: nix
    consumers: [switchboard]
    description: "Writable directory where switchboard stores raw local tool output artifacts"

  - canonical: SWB_TOOL_RESULT_DEDUPE_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable per-request reuse of identical local tool-call observations"

  - canonical: SWB_LOCAL_TOOL_MAX_INPUT_TOKENS
    aliases: []
    default: "5000"
    layer: nix
    consumers: [switchboard]
    description: "Max input tokens for local-tool-calling profile (must leave headroom for output within LLAMA_CTX_SIZE)"

  - canonical: SWB_LOCAL_TOOL_MAX_OUTPUT_TOKENS
    aliases: []
    default: "1024"
    layer: nix
    consumers: [switchboard]
    description: "Max output tokens for local-tool-calling profile"

  - canonical: SWB_CONNECT_TIMEOUT_S
    aliases: []
    default: "10"
    layer: nix
    consumers: [switchboard]
    description: "HTTP connect timeout in seconds for both local and remote model backends"

  - canonical: SWB_WRITE_TIMEOUT_S
    aliases: []
    default: "60"
    layer: nix
    consumers: [switchboard]
    description: "HTTP write timeout in seconds when streaming request body to model backend"

  - canonical: SWB_POOL_TIMEOUT_S
    aliases: []
    default: "30"
    layer: nix
    consumers: [switchboard]
    description: "Connection pool acquisition timeout in seconds"

  - canonical: SWB_LOCAL_READ_TIMEOUT_S
    aliases: []
    default: "900"
    layer: nix
    consumers: [switchboard]
    description: "HTTP read timeout in seconds for local model responses (Qwen long inference)"

  - canonical: SWB_REMOTE_READ_TIMEOUT_S
    aliases: []
    default: "300"
    layer: nix
    consumers: [switchboard]
    description: "HTTP read timeout in seconds for remote model responses"

  - canonical: SWB_STREAM_READ_TIMEOUT_S
    aliases: []
    default: "1800"
    layer: nix
    consumers: [switchboard]
    description: "HTTP read timeout in seconds for streamed responses"

  - canonical: SWB_LOCAL_CONCURRENCY
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Maximum concurrent in-flight requests to local model (Qwen RAM guard)"

  - canonical: SWB_REMOTE_CONCURRENCY
    aliases: []
    default: "4"
    layer: nix
    consumers: [switchboard]
    description: "Maximum concurrent in-flight requests to remote model backend"

  - canonical: SWB_PROFILE_CARDS_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable profile card metadata injection into responses; 0 to disable"

  - canonical: SWB_SEMANTIC_PRUNE_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable semantic candidate pruning in profile selection; 0 to disable"

  - canonical: SWB_SEMANTIC_TOP_K
    aliases: []
    default: "8"
    layer: nix
    consumers: [switchboard]
    description: "Number of top semantic candidates to retain after embedding-based pruning"

  - canonical: SWB_SEMANTIC_MAX_CANDIDATES
    aliases: []
    default: "24"
    layer: nix
    consumers: [switchboard]
    description: "Maximum candidate profiles to score before semantic pruning"

  - canonical: SWB_SEMANTIC_EMBED_TIMEOUT_S
    aliases: []
    default: "4"
    layer: nix
    consumers: [switchboard]
    description: "Timeout in seconds for embedding API calls during semantic profile selection"

  - canonical: SWB_REASONING_MODE
    aliases: []
    default: "hybrid"
    layer: nix
    consumers: [switchboard]
    description: "Profile selection reasoning mode: hybrid | lexical | semantic"

  - canonical: SWB_LEXICAL_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable lexical keyword scoring in profile selection; 0 to disable"

  - canonical: SWB_DECOMPOSE_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable query decomposition before profile matching; 0 to disable"

  - canonical: SWB_ANSWERABILITY_GATE_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable answerability gate (minimum score filter before delegation); 0 to disable"

  - canonical: SWB_ANSWERABILITY_MIN_SCORE
    aliases: []
    default: "0.28"
    layer: nix
    consumers: [switchboard]
    description: "Minimum answerability score required to pass the gate (0.0–1.0)"

  - canonical: SWB_LOOP_DETECT_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable conversation loop detection; 0 to disable"

  - canonical: SWB_LOOP_DETECT_WINDOW
    aliases: []
    default: "3"
    layer: nix
    consumers: [switchboard]
    description: "Number of recent turns to inspect for repetition in loop detection"

  - canonical: SWB_LOOP_DETECT_THRESHOLD
    aliases: []
    default: "0.72"
    layer: nix
    consumers: [switchboard]
    description: "Cosine similarity threshold above which two turns are considered repeated (loop)"

  - canonical: SWB_LOOP_DETECT_LOG_PATH
    aliases: []
    default: "/var/log/nixos-ai-stack/loop-events.jsonl"
    layer: nix
    consumers: [switchboard]
    description: "Path to JSONL file where loop-detection events are appended"

  - canonical: SWB_REMOTE_MODEL_ALIASES_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable alias resolution for remote model profiles; 0 to use profile model IDs as-is"

  - canonical: SWB_REMOTE_MODEL_ALIAS_GEMINI
    aliases: []
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Remote model alias for Gemini-role profiles (e.g. gemini-2.5-pro)"

  - canonical: SWB_REMOTE_MODEL_ALIAS_FREE
    aliases: []
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Remote model alias for free-tier profiles"

  - canonical: SWB_REMOTE_MODEL_ALIAS_CODING
    aliases: []
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Remote model alias for coding-specialized profiles"

  - canonical: SWB_REMOTE_MODEL_ALIAS_REASONING
    aliases: []
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Remote model alias for reasoning/thinking profiles"

  - canonical: SWB_REMOTE_MODEL_ALIAS_TOOL_CALLING
    aliases: []
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Remote model alias for tool-calling profiles"

  - canonical: SWB_REMOTE_DAILY_TOKEN_CAP
    aliases: []
    default: "0"
    layer: nix
    consumers: [switchboard]
    description: "Daily remote token budget cap; 0 = unlimited; trips REMOTE_BUDGET_FALLBACK_LOCAL when exceeded"

  - canonical: SWB_REMOTE_BUDGET_FALLBACK_LOCAL
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Fall back to local model when remote daily token cap is hit; 0 to reject instead"

  - canonical: SWB_REMOTE_BUDGET_STATE_PATH
    aliases: []
    default: ""
    layer: nix
    consumers: [switchboard]
    description: "Path to JSON file persisting daily remote token usage across restarts"

  - canonical: SWB_HINTS_TIMEOUT_S
    aliases: []
    default: "3.0"
    layer: nix
    consumers: [switchboard]
    description: "Timeout in seconds for hybrid-coordinator hints API calls during request enrichment"

  - canonical: SWB_LOCAL_BUSY_WARN_S
    aliases: []
    default: "30"
    layer: nix
    consumers: [switchboard]
    description: "Log a warning when a request waits longer than this many seconds for a local concurrency slot"

  - canonical: SWB_STARTUP_PREFIX_WARM_ENABLED
    aliases: []
    default: "1"
    layer: nix
    consumers: [switchboard]
    description: "Enable KV-cache prefix warming on startup; 0 to skip"

  - canonical: SWB_CONTINUE_LOCAL_MAX_INPUT_TOKENS
    aliases: []
    default: "4000"
    layer: nix
    consumers: [switchboard]
    description: "Maximum input tokens passed to local model in Continue IDE adapter context"

  - canonical: SWB_CONTINUE_LOCAL_MAX_MESSAGES
    aliases: []
    default: "12"
    layer: nix
    consumers: [switchboard]
    description: "Maximum conversation messages passed to local model in Continue IDE adapter context"

  # ── AIDB ────────────────────────────────────────────────────────────────
  - canonical: AIDB_URL
    aliases: []
    default: "http://127.0.0.1:8002"
    layer: all
    consumers: [hybrid-coordinator, aq-qa, dashboard-backend]
    description: "Base URL of the AIDB service (port 8002)"

  - canonical: AIDB_PORT
    aliases: []
    default: "8002"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for AIDB"

  - canonical: AIDB_API_KEY
    aliases: []
    default: ""
    layer: nix
    consumers: [hybrid-coordinator, ralph-wiggum, dashboard-backend]
    description: "API key for AIDB service authentication"

  # ── Qdrant ──────────────────────────────────────────────────────────────
  - canonical: AIDB_API_KEY_FILE
    aliases: []
    default: "/run/secrets/aidb_api_key"
    layer: all
    consumers: [aq-index-knowledge-graph]
    description: "Path to the AIDB API key used by the knowledge graph indexer when --ingest is enabled"

  - canonical: AIDB_QDRANT_VECTORIZE_MAX_CONCURRENCY
    aliases: []
    default: "2"
    layer: nix
    consumers: [aidb]
    description: "Maximum concurrent background Qdrant vectorization tasks launched by AIDB imports"

  - canonical: AIDB_QDRANT_VECTORIZE_MAX_QUEUE
    aliases: []
    default: "16"
    layer: nix
    consumers: [aidb]
    description: "Maximum pending background Qdrant vectorization tasks before AIDB skips new fire-and-forget import vectorization"

  - canonical: AIDB_QDRANT_VECTORIZE_TIMEOUT_S
    aliases: []
    default: "45"
    layer: nix
    consumers: [aidb]
    description: "Per-document timeout in seconds for AIDB background Qdrant vectorization"

  - canonical: QDRANT_URL
    aliases: []
    default: "http://127.0.0.1:6333"
    layer: all
    consumers: [hybrid-coordinator, aq-qa]
    description: "Base URL of the Qdrant vector DB (port 6333)"

  - canonical: QDRANT_PORT
    aliases: []
    default: "6333"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for Qdrant"

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  - canonical: POSTGRES_URL
    aliases: []
    default: "postgresql://localhost:5432/aidb"
    layer: all
    consumers: [hybrid-coordinator, dashboard-backend]
    description: "PostgreSQL connection URL"

  - canonical: POSTGRES_PORT
    aliases: []
    default: "5432"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for PostgreSQL"

  - canonical: POSTGRES_DB
    aliases: []
    default: "aidb"
    layer: shell
    consumers: [service-endpoints.sh, aq-qa]
    description: "PostgreSQL database name"

  - canonical: POSTGRES_USER
    aliases: []
    default: "aidb"
    layer: all
    consumers: [hybrid-coordinator, aidb, autonomous-improvement, meta-optimization]
    description: "PostgreSQL database user"

  - canonical: AIDB_TOOL_SCHEMA_CACHE
    aliases: []
    default: "/var/lib/ai-stack/aidb/mcp-cache/tool_schemas.json"
    layer: service
    consumers: [aidb]
    description: "Writable filesystem cache for discovered MCP tool schemas"

  # ── Redis ───────────────────────────────────────────────────────────────
  - canonical: REDIS_URL
    aliases: []
    default: "redis://127.0.0.1:6379"
    layer: all
    consumers: [hybrid-coordinator, dashboard-backend]
    description: "Redis connection URL"

  - canonical: REDIS_PORT
    aliases: []
    default: "6379"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for Redis"

  # ── Dashboard ───────────────────────────────────────────────────────────
  - canonical: DASHBOARD_URL
    aliases: [DASHBOARD_API_URL]
    default: "http://127.0.0.1:8889"
    layer: all
    consumers: [aq-qa, scripts]
    description: "Base URL of the command-center dashboard (port 8889)"

  - canonical: DASHBOARD_API_PORT
    aliases: [DASHBOARD_PORT]
    default: "8889"
    layer: shell
    consumers: [service-endpoints.sh]
    description: "Port for dashboard API"

  # ── Ralph Wiggum ────────────────────────────────────────────────────────
  - canonical: RALPH_URL
    aliases: []
    default: "http://127.0.0.1:8004"
    layer: all
    consumers: [aq-qa, scripts]
    description: "Base URL of the ralph-wiggum service (port 8004)"

  - canonical: RALPH_API_KEY
    aliases: []
    default: ""
    layer: shell
    consumers: [aq-qa, scripts/testing/harness_qa]
    description: "API key for ralph-wiggum; falls back to aidb_api_key secret (/run/secrets/aidb_api_key)"

  # ── Aider Wrapper ────────────────────────────────────────────────────────
  - canonical: AIDER_WRAPPER_PORT
    aliases: []
    default: "8090"
    layer: all
    consumers: [aq-qa, scripts/testing/harness_qa]
    description: "Port for the aider-wrapper service (default 8090)"

  - canonical: AIDER_WRAPPER_API_KEY
    aliases: []
    default: ""
    layer: shell
    consumers: [aq-qa, scripts/testing/harness_qa]
    description: "API key for aider-wrapper; falls back to /run/secrets/aider_wrapper_api_key"

  # ── Prometheus / Grafana ────────────────────────────────────────────────
  - canonical: PROMETHEUS_URL
    aliases: []
    default: "http://127.0.0.1:9090"
    layer: all
    consumers: [aq-qa]
    description: "Base URL of Prometheus (port 9090)"

  - canonical: GRAFANA_URL
    aliases: []
    default: "http://127.0.0.1:3000"
    layer: all
    consumers: [aq-qa]
    description: "Base URL of Grafana (port 3000)"

  # ── Routing / policy ────────────────────────────────────────────────────
  - canonical: AI_ROUTING_POLICY_FILE
    aliases: []
    default: ""
    layer: nix
    consumers: [hybrid-coordinator (ai_coordinator_handlers.py)]
    description: "Path to routing-policy.yaml config (Phase C)"

  - canonical: RUNTIME_SAFETY_POLICY_FILE
    aliases: []
    default: ""
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Path to runtime-safety-policy.json"

  - canonical: RUNTIME_BUDGET_POLICY_FILE
    aliases: []
    default: ""
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Path to runtime-budget-policy.json"

  - canonical: RUNTIME_ISOLATION_PROFILES_FILE
    aliases: []
    default: ""
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Path to runtime-isolation-profiles.json"

  - canonical: WORKFLOW_BLUEPRINTS_FILE
    aliases: []
    default: ""
    layer: nix
    consumers: [hybrid-coordinator]
    description: "Path to workflow-blueprints.json"

  # ── Dashboard feature gates ──────────────────────────────────────────────
  - canonical: DASHBOARD_AQ_QA_BACKGROUND
    aliases: []
    default: "0"
    layer: nix
    consumers: [dashboard-backend (health.py)]
    description: "Enable background aq-qa spawning from dashboard (0=off, 1=on)"

  - canonical: DASHBOARD_AQ_REPORT_INLINE_REFRESH
    aliases: []
    default: "0"
    layer: nix
    consumers: [dashboard-backend (ai_insights.py)]
    description: "Enable inline aq-report refresh from dashboard (0=off, 1=on)"

  - canonical: DASHBOARD_AI_INSIGHTS_REPORT_PATH
    aliases: []
    default: "/var/lib/ai-stack/hybrid/telemetry/latest-aq-report.json"
    layer: nix
    consumers: [dashboard-backend (ai_insights.py)]
