# training-manifest.yaml — Agent-Agnostic Harness Training Contract
#
# SSOT for what the NixOS-Dev-Quick-Deploy harness trains, evaluates, and
# requires from any model or agent — local or remote.
#
# Purpose:
#   When a new model is loaded (aq-model-switch) or a new remote agent is
#   registered, this manifest defines what eval must pass, what prompt
#   extensions must be injected, and what training data is authoritative.
#
# Format contract:
#   - eval_packs: list of JSON eval packs to run on onboard
#   - quality_gates: minimum pass rates (reject model if below)
#   - prompt_extensions_file: path to accumulated model-agnostic improvements
#   - training_sources: canonical telemetry paths for the ingest pipeline
#   - post_switch_hooks: shell commands to run after any model swap
#
# Schema version: 1.0 (Phase 72+)
# Last updated: 2026-05-27

schema_version: "1.0"

# ── Eval packs ────────────────────────────────────────────────────────────────
# All packs are evaluated on every model onboard. Pass/fail is logged to
# /var/lib/ai-stack/hybrid/telemetry/training-loop-results.jsonl.
eval_packs:
  - path: data/harness-gap-eval-pack.json
    description: "Core harness capabilities: NixOS, agent workflow, Python async"
    required_pass_rate: 0.70   # model rejected for onboard if below this
    mode: hybrid               # route through hybrid-coordinator

  - path: data/harness-golden-evals.json
    description: "Golden regression set — must not regress from baseline"
    required_pass_rate: 0.80
    mode: hybrid

  - path: data/harness-holdout-evals.json
    description: "Holdout set — measures generalization (no training on these)"
    required_pass_rate: 0.50   # lower bar — holdout is unseen
    mode: hybrid

# ── Quality gates ─────────────────────────────────────────────────────────────
quality_gates:
  # Block a model switch if eval pass rate is below required_pass_rate above.
  block_on_failure: false          # warn only (set true to hard-block)
  # Minimum response length for a non-trivial answer (words).
  min_response_words: 15
  # Minimum quality score from training_ingest heuristic.
  min_quality_score: 0.65
  # Avg feedback threshold below which the model is flagged for review.
  low_feedback_alert_threshold: 0.30

# ── Prompt extensions ─────────────────────────────────────────────────────────
# Accumulated model-agnostic improvements generated by training_ingest.py.
# Any new model or agent MUST load this file before its first inference.
# Written by: training_ingest.py generate_prompt_extensions()
# Read by: agent_executor.py _get_system_prompt(), Continue config rules
prompt_extensions_file: config/harness-prompt-extensions.yaml

# ── Training data sources ─────────────────────────────────────────────────────
# Canonical paths for the ingestion pipeline (training_ingest.py).
# Model-agnostic: same data trains any model that replaces Qwen3-35B.
training_sources:
  hybrid_events:
    path: /var/lib/ai-stack/hybrid/telemetry/hybrid-events.jsonl
    event_types:
      - inference_complete
      - chat_completion
      - hybrid_completion
      - local_inference
      - agent_step_complete
    min_latency_ms: 500
    description: "Primary source — successful inference pairs (352k+ events)"

  delegation_feedback:
    path: /var/lib/ai-stack/hybrid/telemetry/delegation-feedback.jsonl
    description: "Failure analysis + user /rate feedback (activates gap detection)"

  optimization_proposals:
    path: /var/lib/ai-stack/hybrid/telemetry/optimization_proposals.jsonl
    description: "Pending proposals — auto-approve iteration limit increases ≤1.5×"

  fine_tuning_dataset:
    path: ~/.local/share/nixos-ai-stack/fine-tuning/dataset.jsonl
    description: "Output JSONL — consumed by fine-tuning scripts"

# ── Post-switch hooks ─────────────────────────────────────────────────────────
# Commands run by aq-model-switch after a successful model load.
# All hooks are non-blocking (background) — model switch is not delayed.
post_switch_hooks:
  - id: baseline_eval
    description: "Establish eval baseline for new model"
    command: "aq-local-training-loop --mode once --dry-run"
    background: true
    timeout_s: 1200

  - id: training_ingest
    description: "Seed training pipeline with recent events"
    command: "python3 ai-stack/local-agents/training_ingest.py --hours 48"
    background: true
    timeout_s: 300

# ── Agent routing rules ───────────────────────────────────────────────────────
# Which agents are subject to this manifest.
# "local" = local llama.cpp; remote agents are evaluated via hybrid-coordinator.
agent_scope:
  local:
    - local-agent
    - local-tool-calling
    - continue-local
  remote:
    - remote-free
    - remote-coding
    - remote-reasoning
    - remote-gemini
  eval_mode: hybrid   # always route eval cases through hybrid-coordinator

# ── Fine-tuning policy ────────────────────────────────────────────────────────
# Controls how training pairs are accumulated and when fine-tuning is triggered.
fine_tuning:
  # Minimum samples before triggering a fine-tuning run suggestion.
  trigger_threshold: 100
  # Format: openai-chat ({"messages": [...]})
  dataset_format: openai-chat
  # Auto-deduplication using SHA-256 content hash.
  deduplication: true
  # Do not include holdout-evals cases in the training dataset.
  exclude_holdout: true
