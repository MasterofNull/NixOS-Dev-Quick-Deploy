# Model Catalog — runtime-editable, no nixos-rebuild needed to add models.
#
# To add a new model:
#   1. Add an entry here with the required fields
#   2. Download the GGUF to /var/lib/llama-cpp/models/<file>
#   3. In nix/hosts/<host>/facts.nix set llamaCpp.activeModel = "<key>"
#      (or llamaCpp.model = "/path/to/file" to bypass catalog entirely)
#   4. sudo nixos-rebuild switch --flake .#nixos   ← only needed for model path
#
# For embedding models: set embeddingServer.activeModel = "<key>" in facts.nix
#
# Fields:
#   name            Human-readable name
#   file            GGUF filename (placed in /var/lib/llama-cpp/models/)
#   type            chat | embedding
#   params          Parameter description (display only)
#   context         Max context window in tokens
#   ram_q4          Approximate RAM for Q4 quant (display only)
#   model_family    Architecture family: qwen3 | gemma | phi | smollm | llama | mistral | other
#   think_mode      true if model supports <think> CoT block (Qwen3, DeepSeek-R1 style)
#   no_think_prefix "/no_think" prefix to disable thinking (Qwen3 specific; blank if n/a)
#   tool_calling    true if model has built-in tool/function calling support
#   stop_sequences  Model-specific stop tokens (list); empty = use llama.cpp defaults
#   chat_template   jinja | chatml | alpaca | auto (auto = llama.cpp detects from GGUF)
#   recommended_gpu_layers  Suggested --n-gpu-layers for this hardware (Renoir iGPU)
#   notes           Operator notes

chat_models:

  qwen3.6-35b:
    name: "Qwen3.6 35B A3B Instruct (MoE)"
    file: "Qwen3.6-35B-A3B-UD-Q4_K_M.gguf"
    type: chat
    params: "35B (3B active MoE)"
    context: 262144
    ram_q4: "~22.1 GB"
    model_family: qwen3
    think_mode: true
    no_think_prefix: "/no_think"
    tool_calling: true
    stop_sequences:
      - "<|im_end|>"
      - "<|endoftext|>"
    chat_template: jinja
    recommended_gpu_layers: 12
    notes: "Current default. Best quality; ~90-120s/response on CPU-only inference."

