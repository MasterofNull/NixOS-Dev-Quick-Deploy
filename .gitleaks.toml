title = "NixOS-Dev-Quick-Deploy Gitleaks Configuration"

[extend]
useDefault = true

# Keep compatibility with older gitleaks versions used by GitHub Action v2.
[allowlist]
description = "Known non-secret documentation and fixture patterns"
paths = [
  '''^\.agent/.*$''',
  '''^\.agents/.*$''',
  '''^scripts/ai/aqd$''',
  '''^docs/archive/.*$''',
  '''^archive/.*\.key$''',
  '''^archive/.*\.pem$''',
  '''^archive/.*\.cert$''',
  '''^archive/.*$''',
  '''^\.forks/.*$''',
  '''^tests/chaos-engineering/.*$''',
  '''^tests/progressive-disclosure-validation\.py$''',
  '''^scripts/governance/check-cross-surface-contract\.py$''',
]
regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',
  '''AKIAXXXXXXXXXXXXXXXX''',
  '''sk-(test|live|proj)-(example|dummy|fake|placeholder|test)[A-Za-z0-9_-]*''',
  '''ghp_(example|dummy|fake|placeholder|sample|test|your_token_here)[A-Za-z0-9_]*''',
]
