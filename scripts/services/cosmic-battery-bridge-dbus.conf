<!DOCTYPE busconfig PUBLIC
          "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
          "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow root (systemd service) to own the system76 PowerDaemon name -->
  <policy user="root">
    <allow own="com.system76.PowerDaemon"/>
    <allow send_destination="com.system76.PowerDaemon"/>
    <allow receive_sender="com.system76.PowerDaemon"/>
  </policy>
  <!-- Allow any user to call the bridge (COSMIC Settings runs as user) -->
  <policy context="default">
    <allow send_destination="com.system76.PowerDaemon"/>
    <allow receive_sender="com.system76.PowerDaemon"/>
  </policy>
</busconfig>
