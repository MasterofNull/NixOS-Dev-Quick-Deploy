name: Validate Shell Scripts

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.sh'
      - 'scripts/**'
      - 'install.sh'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.sh'
      - 'scripts/**'
      - 'install.sh'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-shell-color-echo:
    name: Check Color Echo Usage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Lint color echo usage
        run: |
          chmod +x scripts/governance/lint-color-echo-usage.sh
          ./scripts/governance/lint-color-echo-usage.sh

      - name: Validate ANSI output support
        run: |
          chmod +x scripts/testing/validate-echo-colors.sh
          ./scripts/testing/validate-echo-colors.sh
        
      - name: Comment on PR if issues found
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Shell Script Validation Failed**\n\nColorized `echo` statements were found without `-e`.\n\n**To fix:**\n```bash\n./scripts/governance/lint-color-echo-usage.sh\n```\n\nUse either `echo -e` for ANSI variables or `printf \"%b\\n\"`.'
            })
  
  shellcheck:
    name: ShellCheck linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
          ignore_paths: |
            node_modules
            .git
        continue-on-error: true

      - name: Validate script timeouts
        run: |
          chmod +x scripts/governance/lint-timeouts.sh
          ./scripts/governance/lint-timeouts.sh --ci
        continue-on-error: true
