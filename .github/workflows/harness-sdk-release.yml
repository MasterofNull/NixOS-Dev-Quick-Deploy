name: Harness SDK Release

on:
  pull_request:
    paths:
      - "ai-stack/mcp-servers/hybrid-coordinator/**"
      - "scripts/testing/smoke-harness-sdk-packaging.sh"
      - "scripts/data/generate-harness-sdk-api-docs.sh"
      - "scripts/testing/check-harness-sdk-version-parity.sh"
      - "docs/generated/HARNESS-SDK-API.md"
      - ".github/workflows/harness-sdk-release.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to registries after validation"
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "harness-sdk-v*"

jobs:
  validate:
    name: Validate and Build SDK Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate version parity
        run: |
          chmod +x scripts/testing/check-harness-sdk-version-parity.sh
          if [[ "${GITHUB_REF:-}" == refs/tags/harness-sdk-v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            ./scripts/testing/check-harness-sdk-version-parity.sh "${tag}"
          else
            ./scripts/testing/check-harness-sdk-version-parity.sh
          fi

      - name: Run SDK parity smoke checks
        run: |
          chmod +x scripts/data/generate-harness-sdk-api-docs.sh
          chmod +x scripts/testing/smoke-harness-sdk-packaging.sh
          ./scripts/testing/smoke-harness-sdk-packaging.sh

      - name: Build Python distributions
        run: |
          cd ai-stack/mcp-servers/hybrid-coordinator
          python -m build --outdir dist
          python -m twine check dist/*

      - name: Build npm package tarball
        run: |
          cd ai-stack/mcp-servers/hybrid-coordinator
          npm pack

      - name: Generate provenance and minimal SBOM
        run: |
          chmod +x scripts/data/generate-harness-sdk-provenance.sh
          ./scripts/data/generate-harness-sdk-provenance.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harness-sdk-artifacts
          path: |
            ai-stack/mcp-servers/hybrid-coordinator/dist/*
            ai-stack/mcp-servers/hybrid-coordinator/*.tgz
            dist/harness-sdk-provenance/provenance.json

  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [validate]
    if: startsWith(github.ref, 'refs/tags/harness-sdk-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: harness-sdk-artifacts
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-npm:
    name: Publish JS SDK to npm
    runs-on: ubuntu-latest
    needs: [validate]
    if: (startsWith(github.ref, 'refs/tags/harness-sdk-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')) && secrets.NPM_TOKEN != ''
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd ai-stack/mcp-servers/hybrid-coordinator
          npm publish --access public
