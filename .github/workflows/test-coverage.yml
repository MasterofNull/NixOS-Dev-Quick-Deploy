name: Targeted Coverage

on:
  push:
    branches: [ main, develop, "cursor/*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  targeted-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install targeted coverage dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pytest pytest-cov
          pip install -r dashboard/backend/requirements.txt
          pip install -r ai-stack/mcp-servers/hybrid-coordinator/requirements.txt

      - name: Run targeted coverage suites
        run: |
          chmod +x scripts/testing/run-targeted-coverage.sh
          ./scripts/testing/run-targeted-coverage.sh

      - name: Upload targeted coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: targeted-coverage-artifacts
          path: .reports/coverage-targeted
