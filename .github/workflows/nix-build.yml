name: Nix Build

on:
  push:
    branches: [ main, develop, 'cursor/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  nix-build:
    name: Build NixOS Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes
            
      - name: Check flake
        run: nix flake check --all-systems || true
      
      - name: Build hyperd-ai-dev configuration
        run: |
          nix build .#nixosConfigurations.hyperd-ai-dev.config.system.build.toplevel --print-build-logs || true
      
      - name: Build Summary
        if: always()
        run: |
          echo "### Nix Build Results 🔨" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Built configurations:" >> $GITHUB_STEP_SUMMARY
          echo "- hyperd-ai-dev configuration" >> $GITHUB_STEP_SUMMARY
