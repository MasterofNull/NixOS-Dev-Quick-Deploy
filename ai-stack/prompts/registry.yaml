# Prompt Template Registry — Phase 18.3.1
# Each entry describes a reusable prompt pattern used by the AI stack.
# Fields:
#   id           — unique snake_case identifier
#   name         — human-readable label
#   description  — what this prompt is for
#   template     — Jinja2-compatible template string ({{ var }} for substitutions)
#   tags         — list of category labels
#   mean_score   — float 0-1, auto-updated by scripts/ai/aq-prompt-eval
#   last_evaluated — ISO date of last evaluation run
#
# IMPORTANT: Never hardcode model names, URLs, or port numbers here.
# Templates are rendered by the calling service with injected context variables.

prompts:

  - id: route_search_synthesis
    name: Route-Search Context Synthesis
    description: >
      Core RAG synthesis prompt used in route_handler.py to generate a concise
      answer from retrieved context chunks.  Optimised for NixOS/AI-stack domain
      queries.  The static prefix (AI_PROMPT_CACHE_STATIC_PREFIX) is prepended
      when prompt caching is enabled.
    template: |
      {{ prompt_cache_prefix }}

      User query: {{ query }}

      Context:
      {{ compressed_context }}

      Provide a concise response using the context.
    tags: [rag, synthesis, route_search, systems]
    mean_score: 0.667
    last_evaluated: 2026-04-01

  - id: gap_detection_score
    name: Query Gap Detection
    description: >
      Determines whether a low-confidence retrieval result (score < threshold)
      represents a genuine knowledge gap that should be recorded in the
      query_gaps table and surfaced in the weekly aq-report digest.
    template: |
      Query: {{ query }}
      Retrieval score: {{ score }}
      Collection: {{ collection }}

      The retrieval confidence is low. Is this query unanswerable from the
      current knowledge base? Reply YES or NO followed by a one-line reason.
    tags: [gap_detection, retrieval, monitoring]
    mean_score: 0.333
    last_evaluated: 2026-04-01

  - id: memory_recall_contextualise
    name: Agent Memory Recall Contextualisation
    description: >
      Used by memory_manager.py when recalling stored agent memories to
      contextualise them relative to the current query before returning
      to the calling MCP tool.
    template: |
      Stored memory:
      {{ memory_text }}

      Current query: {{ query }}

      Summarise the memory in one sentence and explain how it relates to
      the current query.  If not relevant, say "Not relevant."
    tags: [memory, recall, context, agent]
    mean_score: 0.667
    last_evaluated: 2026-04-01

  - id: aider_task_systems_code
    name: Aider Systems Code Generation Task
    description: >
      High-performance task prompt for aider-wrapper targeting NixOS modules,
      systemd units, and Python service code.  Enforces project conventions:
      env-var-driven ports, DynamicUser hardening, lib.mkIf guards, no
      hardcoded values.  Designed to maximise first-attempt success rate on
      systems-level changes (Phase 18 measurement target).
    template: |
      TASK: {{ task_description }}

      FILES: {{ files_list }}

      CONSTRAINTS:
      - Never hardcode port numbers or service URLs; read from environment variables
      - NixOS modules: use lib.mkIf for conditional options, never // operator
      - Python services: use python3.withPackages, structlog for logging
      - systemd units: include PrivateTmp, NoNewPrivileges, ProtectSystem=strict
      - One logical change per invocation; do not touch unrelated code

      CHANGE:
      {{ numbered_change_list }}

      DO NOT: {{ exclusion_list }}

      OUTPUT: confirm each change with a diff-style summary line
    tags: [code_generation, aider, systems, nixos, python, measurement_target]
    mean_score: 1.000
    last_evaluated: 2026-04-01

  - id: eval_scorecard_analysis
    name: Eval Scorecard Failure Analysis
    description: >
      Given a harness eval scorecard with failed test cases, produces a
      structured failure analysis with root-cause hypotheses ranked by
      likelihood.  Used to guide prompt refinement after a failing eval run.
    template: |
      Eval run results:
      Passed: {{ passed }} / {{ total }} ({{ pct_passed }}%)
      Threshold: {{ threshold }}%

      Failed test cases:
      {{ failed_cases }}

      For each failure, identify:
      1. Most likely root cause (retrieval, prompt, model, or data)
      2. Suggested fix (one actionable sentence)
      3. Which prompt template (from the registry) to update, if any

      Output as a numbered list matching the failed cases.
    tags: [eval, debugging, prompt_refinement, analysis]
    mean_score: 1.000
    last_evaluated: 2026-04-01

  - id: query_expansion_nixos
    name: NixOS Domain Query Expansion
    description: >
      Expands a user query with NixOS/AI-stack domain synonyms before
      semantic search.  Used by query_expansion.py when
      AI_LLM_EXPANSION_ENABLED=true.  Constrained to ≤3 expansions to
      avoid query drift.
    template: |
      Original query: {{ query }}

      Expand this query with up to 3 alternative phrasings or synonyms
      specific to NixOS, Home Manager, systemd, or this AI stack.
      Return ONLY the expanded queries, one per line, no explanations.
      If no useful expansions exist, return the original query unchanged.
    tags: [query_expansion, retrieval, nixos, domain]
    mean_score: 0.333
    last_evaluated: 2026-04-01

  - id: prsi_pessimistic_cycle_orchestrator
    name: PRSI Pessimistic Cycle Orchestrator
    description: >
      Master orchestration prompt for one-change-per-cycle pessimistic recursive
      self-improvement in the harness. Emphasizes declarative-first changes,
      required verification gates, confidence-aware scoring, and safe halt
      triggers.
    template: |
      ROLE:
      You are the PRSI Orchestrator for NixOS-Dev-Quick-Deploy.

      MISSION:
      Improve reliability, security, eval quality, and efficiency under pessimistic assumptions.
      Assume hidden regressions, benchmark contamination, and silent failures unless disproven.

      HARD CONSTRAINTS:
      - Never hardcode secrets, service URLs, or ports.
      - Prefer declarative-first changes; script fallback only when justified.
      - Apply exactly one mutating logical change this cycle.
      - Every change must include a rollback command.

      CYCLE PHASES:
      A) Scope lock:
      - Emit cycle_plan.json with objective, hypothesis, constraints, blast radius, and acceptance checks.

      B) Discovery:
      - Read latest report, eval, hint telemetry, tool audit, and incident signals.
      - Select one bottleneck by impact x confidence x reversibility.

      C) Proposal:
      - Propose one reversible change with expected KPI delta and side effects.
      - Reject proposal if constraints are violated.

      D) Execute:
      - Apply minimal patch and record commands/evidence.

      E) Verify (required gates):
      - syntax/lint
      - runtime contract checks
      - report schema checks
      - security checks
      - focused smoke/eval
      - regression scan on unaffected critical paths
      - Auto-revert if any required gate fails.

      F) Learn:
      - Emit cycle_outcome.json with KPI delta, confidence, failure taxonomy, and counterfactual risk note.

      G) Decide:
      - Choose proceed, targeted re-eval, or quarantine/escalate.

      REQUIRED OUTPUTS:
      - cycle_plan.json
      - patch.diff
      - validation_report.json
      - cycle_outcome.json
      - rollback_notes.md

      STOP CONDITIONS:
      - boot/shutdown regression
      - repeated unexplained failures
      - safety uncertainty
      - confidence collapse

      SCORE MODEL:
      reliability={{ reliability_weight }}, security={{ security_weight }}, eval={{ eval_weight }},
      cost={{ cost_weight }}, latency={{ latency_weight }}
      Apply penalties for overfit signals, low confidence, missing evidence, and repeated failed actions.
    tags: [prsi, orchestrator, pessimistic, recursive_improvement, safety, evaluation]
    mean_score: 0.000
    last_evaluated: 2026-03-04

  # Phase 6.1: Hint Template Expansion (2026-03-14)
  # Adding diverse templates to improve hint variety beyond research-focused prompts

  - id: code_review_structured
    name: Structured Code Review
    description: >
      Template for systematic code review focusing on correctness, security,
      performance, and maintainability. Produces actionable findings with
      severity and suggested fixes.
    template: |
      REVIEW TARGET:
      {{ file_path }}
      {{ code_snippet }}

      REVIEW CRITERIA:
      1. Correctness: Logic errors, edge cases, error handling
      2. Security: Input validation, injection risks, secrets exposure
      3. Performance: Inefficiencies, N+1 queries, memory leaks
      4. Maintainability: Readability, documentation, test coverage

      OUTPUT FORMAT:
      For each finding:
      - Severity: [critical|high|medium|low|info]
      - Category: [correctness|security|performance|maintainability]
      - Location: line number or function
      - Issue: one-sentence description
      - Fix: concrete suggestion
    tags: [code_review, quality, security, review, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: debugging_systematic
    name: Systematic Debugging Workflow
    description: >
      Step-by-step debugging template for isolating root causes.
      Emphasizes evidence collection, hypothesis testing, and minimal
      reproduction before fix attempts.
    template: |
      ERROR CONTEXT:
      {{ error_message }}
      {{ stack_trace }}

      DEBUGGING PROTOCOL:
      1. Reproduce: Confirm the error occurs consistently
      2. Isolate: Identify the minimal code path that triggers it
      3. Hypothesize: List 3 likely root causes ranked by probability
      4. Test: For each hypothesis, describe a test to confirm/refute
      5. Fix: Apply minimal change to resolve confirmed cause
      6. Verify: Confirm fix works and no regressions introduced

      OUTPUT:
      - Reproduction steps
      - Isolated trigger
      - Root cause (confirmed)
      - Fix applied
      - Verification evidence
    tags: [debugging, troubleshooting, errors, systematic, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: test_generation_coverage
    name: Test Generation for Coverage
    description: >
      Generates test cases targeting uncovered code paths.
      Focuses on edge cases, error conditions, and boundary values.
    template: |
      TARGET FUNCTION:
      {{ function_signature }}
      {{ function_body }}

      COVERAGE GAPS:
      {{ uncovered_lines }}

      GENERATE TESTS FOR:
      1. Happy path: Normal successful execution
      2. Edge cases: Empty inputs, max values, null/undefined
      3. Error conditions: Invalid inputs, resource unavailable
      4. Boundary values: Off-by-one, threshold transitions
      5. Integration points: Mock external dependencies

      OUTPUT:
      Test cases in {{ test_framework }} format with:
      - Descriptive test names
      - Clear arrange/act/assert structure
      - Expected coverage improvement
    tags: [testing, coverage, test_generation, quality, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: refactoring_incremental
    name: Incremental Refactoring Plan
    description: >
      Plans safe incremental refactoring with verification gates.
      Maintains behavior while improving structure.
    template: |
      REFACTORING TARGET:
      {{ code_to_refactor }}

      IMPROVEMENT GOALS:
      {{ goals }}

      CONSTRAINTS:
      - No behavior changes (verified by existing tests)
      - One logical change per step
      - Each step must be independently deployable
      - Maintain backward compatibility during transition

      REFACTORING PLAN:
      1. Add tests if coverage < 80%
      2. Extract: {{ extraction_candidates }}
      3. Rename: {{ rename_candidates }}
      4. Simplify: {{ simplification_candidates }}
      5. Verify: Run full test suite after each step

      OUTPUT:
      Numbered steps with before/after diffs
    tags: [refactoring, improvement, incremental, safe_changes, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: documentation_api
    name: API Documentation Generator
    description: >
      Generates comprehensive API documentation from code.
      Includes examples, error codes, and usage patterns.
    template: |
      API ENDPOINT/FUNCTION:
      {{ code }}

      DOCUMENT:
      1. Purpose: One-sentence description
      2. Parameters: Name, type, required/optional, constraints
      3. Returns: Type, structure, possible values
      4. Errors: Error codes, conditions, handling recommendations
      5. Examples: 2-3 usage examples with curl/code snippets
      6. Related: Links to related endpoints/functions

      FORMAT: {{ output_format }}
    tags: [documentation, api, reference, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: security_audit_focused
    name: Focused Security Audit
    description: >
      Security-focused code review targeting OWASP Top 10 and
      common vulnerability patterns in the project's tech stack.
    template: |
      AUDIT TARGET:
      {{ code_or_config }}

      SECURITY CHECKLIST:
      - [ ] Input validation and sanitization
      - [ ] Authentication and authorization
      - [ ] Secrets management (no hardcoded credentials)
      - [ ] SQL/command injection prevention
      - [ ] XSS prevention (output encoding)
      - [ ] CSRF protection
      - [ ] Secure defaults (least privilege)
      - [ ] Error handling (no sensitive data leakage)
      - [ ] Dependency vulnerabilities
      - [ ] Logging (no secrets in logs)

      OUTPUT:
      For each vulnerability:
      - Severity: [critical|high|medium|low]
      - OWASP category
      - Location
      - Proof of concept (if safe)
      - Remediation steps
    tags: [security, audit, owasp, vulnerabilities, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: performance_optimization
    name: Performance Optimization Analysis
    description: >
      Identifies performance bottlenecks and suggests optimizations.
      Focuses on measurable improvements with minimal code changes.
    template: |
      PERFORMANCE CONTEXT:
      {{ code_or_profile }}
      {{ metrics }}

      ANALYSIS TARGETS:
      1. CPU-bound: Hot loops, inefficient algorithms
      2. Memory-bound: Allocations, leaks, caching opportunities
      3. I/O-bound: Database queries, network calls, file operations
      4. Concurrency: Blocking operations, lock contention

      OPTIMIZATION CRITERIA:
      - Impact: Expected improvement percentage
      - Effort: Lines of code to change
      - Risk: Likelihood of regressions
      - Measurability: How to verify improvement

      OUTPUT:
      Ranked list of optimizations with:
      - Current: Baseline measurement
      - Target: Expected improvement
      - Change: Specific code modification
      - Verification: Benchmark command
    tags: [performance, optimization, profiling, efficiency, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: migration_upgrade_plan
    name: Migration/Upgrade Planning
    description: >
      Plans safe migrations or upgrades with rollback strategies.
      Covers dependency updates, schema changes, and API migrations.
    template: |
      MIGRATION SCOPE:
      From: {{ current_version }}
      To: {{ target_version }}
      Components: {{ affected_components }}

      MIGRATION PLAN:
      1. Pre-flight:
         - Backup current state
         - Document rollback procedure
         - Identify breaking changes
      2. Staging:
         - Apply migration in test environment
         - Run integration tests
         - Verify data integrity
      3. Production:
         - Schedule maintenance window if needed
         - Apply migration with monitoring
         - Verify functionality
      4. Post-migration:
         - Clean up deprecated artifacts
         - Update documentation
         - Monitor for regressions

      ROLLBACK TRIGGER:
      {{ rollback_conditions }}

      OUTPUT:
      Step-by-step runbook with verification commands
    tags: [migration, upgrade, planning, rollback, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: api_integration_guide
    name: API Integration Implementation
    description: >
      Guides implementation of external API integrations.
      Covers authentication, error handling, rate limiting, and caching.
    template: |
      API TO INTEGRATE:
      {{ api_name }}
      {{ api_docs_url }}

      IMPLEMENTATION CHECKLIST:
      1. Authentication:
         - Method: {{ auth_method }}
         - Credential storage: Environment variables only
      2. Client setup:
         - Timeout configuration
         - Retry with exponential backoff
         - Connection pooling
      3. Error handling:
         - HTTP status codes
         - API-specific error formats
         - Graceful degradation
      4. Rate limiting:
         - Respect API limits
         - Implement local throttling
         - Queue for burst protection
      5. Caching:
         - Cache-Control header respect
         - Local cache for repeated requests
         - Cache invalidation strategy

      OUTPUT:
      Implementation code with inline comments explaining each decision
    tags: [api, integration, external, client, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: configuration_setup
    name: Configuration and Setup Guide
    description: >
      Guides configuration tasks with validation and verification steps.
      Emphasizes declarative configuration and rollback safety.
    template: |
      CONFIGURATION TASK:
      {{ task_description }}

      CONFIGURATION APPROACH:
      1. Identify target: {{ config_file_or_service }}
      2. Backup current: `cp {{ config_path }} {{ config_path }}.bak`
      3. Validate syntax before applying
      4. Apply incrementally with verification
      5. Test functionality after each change

      VALIDATION COMMANDS:
      {{ validation_commands }}

      ROLLBACK COMMAND:
      {{ rollback_command }}

      OUTPUT:
      Configuration changes with:
      - Before/after comparison
      - Verification evidence
      - Rollback confirmation
    tags: [configuration, setup, declarative, validation, hint_diversity]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  # Phase 4.3: Compact Delegation Templates (2026-03-14)
  # Token-efficient templates for task-class-specific delegation

  - id: delegation_simple
    name: Simple Query Delegation
    description: >
      Compact delegation prompt for simple factual queries.
      Minimal system prefix, direct response expected.
    template: |
      {{ task }}

      Reply concisely (1-3 sentences). No preamble.
    tags: [delegation, compact, simple_query, token_efficient]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: delegation_code
    name: Code Completion Delegation
    description: >
      Compact delegation for code generation tasks.
      Direct code output with minimal explanation.
    template: |
      {{ task }}

      Output only the code. Use {{ language }} syntax.
      No explanations unless essential for correctness.
    tags: [delegation, compact, code_completion, token_efficient]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: delegation_reasoning
    name: Reasoning Task Delegation
    description: >
      Structured delegation for complex reasoning tasks.
      Balanced between detail and token efficiency.
    template: |
      {{ task }}

      Structure your response:
      1. Key findings (2-4 bullet points)
      2. Recommendation (1-2 sentences)
      3. Evidence (specific references)

      Be direct. Omit hedging language.
    tags: [delegation, structured, reasoning, token_efficient]
    mean_score: 0.000
    last_evaluated: 2026-03-14

  - id: delegation_architecture
    name: Architecture Decision Delegation
    description: >
      Structured delegation for design and architecture tasks.
      Emphasizes trade-offs and concrete recommendations.
    template: |
      {{ task }}

      Analyze and recommend:
      1. Options considered (brief list)
      2. Trade-offs (table format if >2 options)
      3. Recommendation with rationale
      4. Implementation notes (if applicable)

      Prefer concrete over abstract.
    tags: [delegation, structured, architecture, design, token_efficient]
    mean_score: 0.000
    last_evaluated: 2026-03-14
