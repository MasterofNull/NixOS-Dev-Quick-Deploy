# =============================================================================
# CATEGORY: AI Stack Harness Tools (Local)
# =============================================================================
ai_stack_tools:
  - id: hybrid_coordinator
    name: hybrid-coordinator
    type: http_service
    port: 8003
    description: "Route queries between local/remote LLM; semantic search; agent memory; workflow hints"
    when_to_use: "Semantic search, workflow hints, agent memory, routing decisions"
    tags: [ai-stack, llm, search, hints, memory, routing]
    endpoints: ["/query", "/hints", "/memory/store", "/memory/recall", "/workflow/plan"]
    priority: high

  - id: aidb
    name: aidb
    type: http_service
    port: 8002
    description: "Document import/search, vector similarity, knowledge base"
    when_to_use: "Import documents, search knowledge base, vector queries"
    tags: [ai-stack, documents, vector, knowledge, rag]
    endpoints: ["/documents", "/query", "/vector/search"]
    priority: high

  - id: aqd
    name: aqd
    type: cli
    description: "Guided workflow CLI - project-init, primer, brownfield, retrofit"
    when_to_use: "Initialize new projects, prime sessions, guided workflows"
    tags: [cli, workflow, project-init, primer]
    commands: ["workflows project-init", "workflows primer", "workflows brownfield"]
    priority: high

  - id: aq_hints
    name: aq-hints
    type: cli
    description: "Query workflow hints from hybrid-coordinator"
    when_to_use: "Get contextual hints for current task, workflow suggestions"
    tags: [cli, hints, workflow, context]
    flags: ["--format=json|text", "--agent=TYPE", "-q QUERY"]
    priority: high

  - id: aq_report
    name: aq-report
    type: cli
    description: "9-section AI stack performance digest"
    when_to_use: "Review stack performance, get recommendations, track metrics"
    tags: [cli, report, metrics, performance]
    flags: ["--since=7d", "--format=text|json", "--aidb-import"]
    priority: medium

  - id: aq_qa
    name: aq-qa
    type: cli
    description: "Phase-based QA runner for AI stack health checks"
    when_to_use: "Run health checks, validate services, test integrations"
    tags: [cli, qa, health, testing]
    commands: ["aq-qa 0", "aq-qa 1", "aq-qa 2"]
    priority: medium

  - id: aq_prompt_eval
    name: aq-prompt-eval
    type: cli
    description: "Evaluate prompt registry against canonical tests"
    when_to_use: "Score prompts, compare strategies, optimize templates"
    tags: [cli, eval, prompts, testing]
    flags: ["--strategy LABEL", "--aidb-import"]
    priority: medium

